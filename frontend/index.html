<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriting Synthesis System</title>

    <!-- Google Fonts: Staatliches for stylized headers and Inter for clean readable labels -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Staatliches&display=swap" rel="stylesheet">
    
    <!-- React and ReactDOM CDNs (Stable production releases) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone for in-browser JSX compilation -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.5/babel.min.js"></script>
    
    <!-- Application Styling -->
    <link rel="stylesheet" href="styles.css">

    <div id="root"></div>
